<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Weathify</title>
</head>
<body>
    <div class="container">
    <header>
        <form id="search-form">
            <input type="search" placeholder="Enter city..." id="search-input" class="search-input"/>
            <Input type="submit" value="Search" class="search-button"/>
        </form>
    </header>
    <main>
        <div class="weather-data">
        <div>
        <h1 id="city">
        </h1>
        <p>
            <span id="time"></span>, <span id="description"></span>
            <br/>
            Humidity 
            <span class="weather-details" id="humidity"></span >, Wind <span class="weather-details" id="wind-speed"></span>
        </p>
        </div>
        <div class="temp-details">
            <div  id="icon"></div>
            <div class="temp-value" id="temperature"></div>
            <div class="temp-unit">℃</div>
        </div>
        </div>
    </main>
    <footer>
        This project was coded by
        <a href="https://github.com/Ann-Kiama" target="blank">
            Ann Kiama
        </a>
        and is 
        <a href="https://github.com/Ann-Kiama/Weathify" target="blank"> open-sourced on Github </a>
    and hosted on
        <a href="https://silver-biscuit-61b8bc.netlify.app/" target="_blank">Netlify</a>
    </footer>
    </div>
    <script src="src/index.js"> </script>
</body>
</html>
