<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css" />
    <title>Weathify</title>
</head>
<body>
    <div class="container">
    <header>
        <form>
            <input type="search" placeholder="Enter city..." class="search-input"/>
            <Input type="submit" value="Search" class="search-button"/>
        </form>
    </header>
    <main>
        <div class="weather-data">
        <div>
        <h1>
            Paris
        </h1>
        <p>
            Monday 12:30, scattered clouds
            <br/>
            Humidity 
            <span class="weather-details">45%</span >, Wind <span class="weather-details">3.35km/h</span>
        </p>
        </div>
        <div class="temp-details">
            <div class="temp-icon">⛅</div>
            <div class="temp-value">12</div>
            <div class="temp-unit">℃</div>
        </div>
        </div>
    </main>
    <footer>
        This project was coded by
        <a href="https://github.com/Ann-Kiama" target="blank">
            Ann Kiama
        </a>
        and is 
        <a href="https://github.com/Ann-Kiama/Weathify" target="blank"> open-sourced on Github </a>
    and hosted on
        <a href="https://silver-biscuit-61b8bc.netlify.app/" target="_blank">Netlify</a>
    </footer>
    </div>
</body>
</html>
